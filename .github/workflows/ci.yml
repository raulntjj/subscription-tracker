# ============================================
# Subscription Tracker — CI Pipeline
# ============================================
# Executa testes automatizados dos módulos backend (Subscription e User)
# Os testes usam SQLite in-memory, sem dependência de serviços externos.

name: CI — Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.2"

jobs:
  # ────────────────────────────────────────────
  # Backend — Lint (Laravel Pint)
  # ────────────────────────────────────────────
  backend-lint:
    name: "Backend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, bcmath, gd, zip, intl, sockets
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock', 'backend/composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Run Pint (dry-run)
        run: ./vendor/bin/pint --test

  # ────────────────────────────────────────────
  # Backend — Tests por módulo
  # ────────────────────────────────────────────
  backend-tests:
    name: "Backend · Tests (${{ matrix.module }})"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    strategy:
      fail-fast: false
      matrix:
        module: [Subscription, User]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, bcmath, gd, zip, intl, sockets
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock', 'backend/composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.ci .env
          php artisan key:generate

      - name: Create storage structure
        run: |
          mkdir -p storage/app/private storage/app/public
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views
          mkdir -p storage/logs/workers
          chmod -R 775 storage bootstrap/cache

      - name: Run module tests — ${{ matrix.module }}
        run: php artisan module:test ${{ matrix.module }}

  # ────────────────────────────────────────────
  # Backend — Full test suite com cobertura
  # ────────────────────────────────────────────
  backend-coverage:
    name: "Backend · Coverage Report"
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, bcmath, gd, zip, intl, sockets
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock', 'backend/composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.ci .env
          php artisan key:generate

      - name: Create storage structure
        run: |
          mkdir -p storage/app/private storage/app/public
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views
          mkdir -p storage/logs/workers
          chmod -R 775 storage bootstrap/cache

      - name: Run full test suite with coverage
        run: |
          ./vendor/bin/phpunit \
            --testsuite "Modules Unit" \
            --coverage-text \
            --coverage-clover=coverage.xml \
            --colors=always

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7
